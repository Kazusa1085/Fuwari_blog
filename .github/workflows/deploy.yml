name: Deploy to GitHub Pages

on:
  # 每次推送到 `main` 分支时触发这个“工作流程”
  # 如果你使用了别的分支名，请按需将 `main` 替换成你的分支名
  push:
    branches: [ main ]
  # 允许你在 GitHub 上的 Actions 标签中手动触发此“工作流程”
  workflow_dispatch:
  # 内容分离：Blog_Archive 有更新时会发一个 repository_dispatch 事件过来
  # （见 Blog_Archive 里的 .github/workflows/notify-build.yml），
  # 触发这里重新构建部署，从而带上最新的文章/友链/项目内容
  repository_dispatch:
    types: [content-updated]

# 允许 job 克隆 repo 并创建一个 page deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v7
      - name: Install, build, and upload your site
        uses: withastro/action@v6
        with:
          node-version: 24 # 用于构建站点的特定 Node.js 版本，v6 默认值即为 24（可选）
          # path: . # 存储库中 Astro 项目的根位置。（可选）
          # package-manager: pnpm@latest # 应使用哪个 Node.js 包管理器来安装依赖项和构建站点。会根据存储库中的 lockfile 自动检测。（可选）
          # build-cmd: pnpm run build # 用于构建你的网站的命令。默认运行软件包的构建脚本或任务。（可选）
        env:
          # 内容分离：.env 不会被提交到仓库，CI 构建时靠这里注入
          # ENABLE_CONTENT_SYNC / CONTENT_REPO_URL，让 prebuild 钩子能正确
          # 从 Blog_Archive 同步 content/ 目录后再构建
          ENABLE_CONTENT_SYNC: "true"
          CONTENT_REPO_URL: "https://github.com/Kazusa1085/Blog_Archive.git"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5